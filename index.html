<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sürpriz Kutusu 💝</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Rajdhani:wght@400;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #ff1493;
  --primary-light: #ff69b4;
  --bg: #0a0a1a;
  --text: #ffffff;
  --book-w: min(85vw, 340px);
  --book-h: min(110vw, 450px);
}

*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);overflow:hidden;font-family:'Rajdhani',sans-serif;color:var(--text);height:100vh;width:100vw;touch-action:none;}

/* PHASES */
.phase{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.8s ease;z-index:10;pointer-events:all;}
.phase.hidden{opacity:0;pointer-events:none;z-index:1;}

/* CANVAS LAYERS */
canvas{position:fixed;inset:0;z-index:1;}

/* COUNTDOWN */
#countdown{font-size:min(45vw,250px);font-weight:900;color:transparent;background:linear-gradient(135deg,var(--primary),var(--primary-light),#fff);
  -webkit-background-clip:text;background-clip:text;text-shadow:0 0 60px rgba(255,20,147,0.8);animation:pulse 0.9s ease-in-out infinite;z-index:20;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.1);}}

/* PHASE 2 GIF & TEXT */
#phase2Content { text-align: center; z-index: 20; display: flex; flex-direction: column; align-items: center; }
#phase2Gif { width: min(80vw, 350px); border-radius: 20px; box-shadow: 0 0 40px rgba(255,20,147,0.5); margin-bottom: 20px; }
#bigMessage{ font-size: min(15vw, 80px); font-weight: 900; color: var(--primary); text-shadow: 0 0 30px var(--primary); margin-bottom: 30px; transition: all 0.5s ease; }

/* HEART ANIMATION */
#bigHeart {
  width: min(40vw, 220px); height: min(40vw, 220px);
  display: none; opacity: 0; transform: scale(0);
  filter: drop-shadow(0 0 30px var(--primary));
  transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
@keyframes heartBeat {
  0%, 100% { transform: scale(1); filter: drop-shadow(0 0 30px var(--primary)); }
  50% { transform: scale(1.1); filter: drop-shadow(0 0 50px var(--primary-light)); }
}
.heart-active { display: block !important; opacity: 1 !important; transform: scale(1) !important; animation: heartBeat 0.8s infinite; }

/* BUTTONS */
.continue-btn{
  padding:18px 50px;background:linear-gradient(135deg,var(--primary),var(--primary-light));
  border:none;border-radius:50px;color:#fff;font-size:20px;font-weight:700;
  letter-spacing:2px;cursor:pointer;box-shadow:0 0 30px rgba(255,20,147,0.6);
  transition:all 0.3s ease;
}
.continue-btn:hover{transform:scale(1.05);box-shadow:0 0 50px rgba(255,20,147,0.9);}

/* PHASE 3 */
#catGif3 { width: min(70vw, 300px); filter: drop-shadow(0 0 30px rgba(255,105,180,0.5)); animation: float 3s ease-in-out infinite; }
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-20px);}}

/* SCRAPBOOK (PHASE 4) */
#phase4 { justify-content: flex-start; padding-top: 20px; }
#phase4Inner { display: flex; flex-direction: column; align-items: center; width: 100%; }

/* Message box over scrapbook */
#msgBox{
  width: min(85vw, 340px); background:rgba(255,255,255,0.95); border-radius:20px;
  padding:15px 20px; margin-bottom:20px;
  box-shadow:0 8px 32px rgba(255,20,147,0.3);
  position:relative; z-index: 100;
}
#msgBox::after{content:'💕';position:absolute;top:10px;right:15px;font-size:16px;}
#msgText{font-family:'Playfair Display',serif;font-style:italic;font-size:15px;
  color:#333;line-height:1.5;text-align:center;}

#scrapbook-container {
  width: var(--book-w); height: var(--book-h);
  perspective: 1500px; position: relative;
}

.book {
  width: 100%; height: 100%; position: relative;
  transform-style: preserve-3d; transition: transform 0.5s;
}

.page {
  position: absolute; width: 100%; height: 100%;
  top: 0; left: 0; transform-origin: left center;
  transform-style: preserve-3d; transition: transform 0.8s cubic-bezier(0.645, 0.045, 0.355, 1);
  cursor: pointer;
}

.page-side {
  position: absolute; width: 100%; height: 100%;
  backface-visibility: hidden; display: flex; flex-direction: column;
  border-radius: 5px 15px 15px 5px; overflow: hidden;
  box-shadow: inset 0 0 100px rgba(0,0,0,0.1), 5px 5px 20px rgba(0,0,0,0.4);
}

.page-front { z-index: 2; background: #fff; }
.page-back { transform: rotateY(-180deg); background: #fdfdfd; z-index: 1; border-radius: 15px 5px 5px 15px; }

.flipped { transform: rotateY(-160deg); }

.cover-front { background: linear-gradient(135deg, #8b0057, #ff1493); display: flex; align-items: center; justify-content: center; color: white; border-left: 10px solid #660040; }
.cover-back { background: linear-gradient(135deg, #ff1493, #8b0057); border-right: 10px solid #660040; }

.page-img { width: 100%; height: 75%; object-fit: cover; border-bottom: 5px solid #eee; }
.page-content { height: 25%; padding: 15px; display: flex; align-items: center; justify-content: center; text-align: center; color: #333; font-family: 'Playfair Display', serif; font-size: 16px; font-style: italic; }

.instruction { position: absolute; bottom: -50px; width: 100%; text-align: center; font-size: 14px; opacity: 0.7; animation: blink 2s infinite; }
@keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

/* REPLAY */
#replayBtn { margin-top: 80px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 10px 20px; border-radius: 20px; cursor: pointer; }

/* CONFETTI */
.confetti { position: fixed; width: 10px; height: 10px; top: -10px; z-index: 100; pointer-events: none; }

</style>
</head>
<body>

<canvas id="matrixCanvas"></canvas>
<canvas id="starsCanvas" style="display:none;"></canvas>

<!-- PHASE 1 -->
<div class="phase" id="phase1">
  <div id="countdown">3</div>
</div>

<!-- PHASE 2 -->
<div class="phase hidden" id="phase2">
  <div id="phase2Content">
    <div id="bigMessage"></div>
    <div id="bigHeart">
      <svg viewBox="0 0 100 100" fill="var(--primary)">
        <path d="M50 88.9L42.8 82.4C17.1 59.1 0 43.6 0 24.6C0 9.1 12.1 0 27.5 0C36.2 0 44.5 4.1 50 10.5C55.5 4.1 63.8 0 72.5 0C87.9 0 100 9.1 100 24.6C100 43.6 82.9 59.1 57.2 82.5L50 88.9Z" />
      </svg>
    </div>
    <img id="phase2Gif" src="" alt="CUTE GIF" style="display:none;">
    <button class="continue-btn" style="display:none; margin-top:20px;" onclick="goPhase4()">Devam Et ✨</button>
  </div>
</div>

<!-- PHASE 3 REMOVED - DIRECT TO 4 -->

<!-- PHASE 4 -->
<div class="phase hidden" id="phase4">
  <div id="phase4Inner">
    <div id="msgBox"><p id="msgText"></p></div>
    <div id="scrapbook-container">
      <div class="book" id="book">
        <!-- Pages will be generated here -->
      </div>
      <div class="instruction">Sayfaları çevirmek için tıkla veya kaydır 📖</div>
    </div>
    <button id="replayBtn" onclick="location.reload()">↺ Baştan İzle</button>
  </div>
</div>

<script>
const CONFIG = {
  matrixMessage: "HAPPY BIRTHDAY", // Bu harfler akacak
  phase2Gif: "https://media.tenor.com/On7tS97Wmo8AAAAd/ki-hi-cat-love.gif", // Varsayılan tatlı kedi (Kendi dosyanı kullanmak istersen burayı "lovebombing.gif" yapabilirsin)
  celebrationGif: "https://media.tenor.com/FeEEBfHmYM0AAAAC/happy-birthday-cat.gif", // Gitar çalan kedi
  
  pages: [
    { 
      photoFront: 'foto1.jpg', 
      photoBack: 'foto2.jpg', 
      message: 'Bizim Hikayemiz Burada Başlıyor 💝' 
    },
    { 
      photoFront: 'foto3.jpg', 
      photoBack: 'foto4.jpg', 
      message: 'En Sevdiğim Anılarımızdan Biri ✨' 
    },
    { 
      photoFront: 'foto1.jpg', 
      photoBack: 'foto3.jpg', 
      message: 'Seni Her Geçen Gün Daha Çok Seviyorum 💕' 
    }
  ]
};

// --- MATRIX ---
const mc = document.getElementById('matrixCanvas');
const mctx = mc.getContext('2d');
let matrixCols, matrixDrops;
const matrixChars = CONFIG.matrixMessage.split('');

function initMatrix(){
  mc.width = window.innerWidth; mc.height = window.innerHeight;
  const fontSize = 16;
  matrixCols = Math.floor(mc.width / fontSize);
  matrixDrops = Array(matrixCols).fill(1);
}
function drawMatrix(){
  mctx.fillStyle = 'rgba(10,10,26,0.1)';
  mctx.fillRect(0,0,mc.width,mc.height);
  const fontSize = 16;
  mctx.font = `900 ${fontSize}px Rajdhani`;
  for(let i=0; i<matrixDrops.length; i++){
    const ch = matrixChars[Math.floor(Math.random()*matrixChars.length)];
    mctx.fillStyle = Math.random() > 0.8 ? '#fff' : '#ff1493';
    mctx.fillText(ch, i*fontSize, matrixDrops[i]*fontSize);
    if(matrixDrops[i]*fontSize > mc.height && Math.random() > 0.975) matrixDrops[i] = 0;
    matrixDrops[i]++;
  }
}
initMatrix();
let matrixInt = setInterval(drawMatrix, 50);

// --- STARS ---
const sc = document.getElementById('starsCanvas');
const sctx = sc.getContext('2d');
let stars = [];
function initStars(){
  sc.width = window.innerWidth; sc.height = window.innerHeight;
  stars = Array.from({length:200}, ()=>({x:Math.random()*sc.width, y:Math.random()*sc.height, r:Math.random()*1.5, a:Math.random(), s:Math.random()*0.02}));
}
function drawStars(){
  sctx.clearRect(0,0,sc.width,sc.height);
  stars.forEach(s=>{
    s.a += s.s; if(s.a>1||s.a<0) s.s*=-1;
    sctx.beginPath(); sctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    sctx.fillStyle=`rgba(255,255,255,${Math.abs(s.a)})`; sctx.fill();
  });
  requestAnimationFrame(drawStars);
}

// --- FLOW ---
let count = 3;
const cd = document.getElementById('countdown');
const cdInt = setInterval(()=>{
  count--;
  if(count > 0) { cd.textContent = count; }
  else { clearInterval(cdInt); goPhase2(); }
}, 1000);

function goPhase2(){
  document.getElementById('phase1').classList.add('hidden');
  document.getElementById('phase2').classList.remove('hidden');
  
  const gif = document.getElementById('phase2Gif');
  const msg = document.getElementById('bigMessage');
  const heart = document.getElementById('bigHeart');
  const btn = document.querySelector('#phase2 .continue-btn');
  
  const words = CONFIG.matrixMessage.split(' ');
  let wordIdx = 0;

  function showNextWord() {
    if (wordIdx < words.length) {
      msg.textContent = words[wordIdx];
      msg.style.opacity = '1';
      msg.style.transform = 'scale(1)';
      
      setTimeout(() => {
        msg.style.opacity = '0';
        msg.style.transform = 'scale(1.5)';
        wordIdx++;
        setTimeout(showNextWord, 600);
      }, 1200);
    } else {
      showHeart();
    }
  }

  function showHeart() {
    heart.classList.add('heart-active');
    setTimeout(() => {
      heart.classList.remove('heart-active');
      heart.style.display = 'none';
      showGif();
    }, 2500);
  }

  function showGif() {
    gif.src = CONFIG.phase2Gif;
    gif.style.display = 'block';
    gif.style.opacity = '0';
    gif.style.transition = 'opacity 1s ease';
    setTimeout(() => { 
      gif.style.opacity = '1'; 
      setTimeout(() => { btn.style.display = 'block'; }, 1000);
    }, 50);
  }

  showNextWord();
}

function goPhase4(){
  document.getElementById('phase2').classList.add('hidden');
  clearInterval(matrixInt);
  mc.style.display = 'none';
  sc.style.display = 'block';
  initStars(); drawStars();
  document.getElementById('phase4').classList.remove('hidden');
  buildBook();
  launchConfetti();
}

// --- BOOK ---
function buildBook(){
  const book = document.getElementById('book');
  book.innerHTML = '';
  const msgText = document.getElementById('msgText');
  
  // Set initial message
  msgText.textContent = CONFIG.pages[0].message || "Sürpriz Klasörümüz 💝";

  CONFIG.pages.forEach((p, i) => {
    const page = document.createElement('div');
    page.className = 'page';
    page.style.zIndex = CONFIG.pages.length - i;
    
    page.innerHTML = `
      <div class="page-side page-front">
        <img src="${p.photoFront}" class="page-img">
        <div class="page-content" style="background:#fff; height:100%; border-top: 1px solid #eee;">
          <p style="font-size: 13px; color: #888;">Sayfa ${i*2 + 1}</p>
        </div>
      </div>
      <div class="page-side page-back">
        <img src="${p.photoBack}" class="page-img">
        <div class="page-content" style="background:#fff; height:100%; border-top: 1px solid #eee;">
          <p style="font-size: 13px; color: #888;">Sayfa ${i*2 + 2}</p>
        </div>
      </div>
    `;
    
    page.onclick = () => {
      const isFlipped = page.classList.toggle('flipped');
      if(isFlipped){
        page.style.zIndex = i + 1;
        // Update message to the next page's message if it exists
        if(CONFIG.pages[i+1]) msgText.textContent = CONFIG.pages[i+1].message;
      } else {
        setTimeout(() => { page.style.zIndex = CONFIG.pages.length - i; }, 300);
        msgText.textContent = p.message || "Sürpriz Klasörümüz 💝";
      }
    };
    
    book.appendChild(page);
  });
}

// --- HELPERS ---
function launchConfetti(){
  for(let i=0; i<100; i++){
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random()*100 + 'vw';
    c.style.background = ['#ff1493','#ff69b4','#fff','#ffd700'][Math.floor(Math.random()*4)];
    c.style.transform = `rotate(${Math.random()*360}deg)`;
    document.body.appendChild(c);
    const fall = c.animate([
      { top: '-10px', opacity: 1 },
      { top: '100vh', opacity: 0, transform: `rotate(${Math.random()*1000}deg)` }
    ], { duration: 2000 + Math.random()*3000, easing: 'linear' });
    fall.onfinish = () => c.remove();
  }
}

window.addEventListener('resize', () => { initMatrix(); initStars(); });
</script>
</body>
</html>

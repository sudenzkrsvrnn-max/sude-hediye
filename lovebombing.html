<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sürpriz Kutusu 💝</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Rajdhani:wght@400;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #ff1493;
  --primary-light: #ff69b4;
  --bg: #0a0a1a;
  --text: #ffffff;
  --book-w: min(85vw, 340px);
  --book-h: min(110vw, 450px);
}

*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);overflow:hidden;font-family:'Rajdhani',sans-serif;color:var(--text);height:100vh;width:100vw;touch-action:none;}

/* PHASES */
.phase{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 0.8s ease;z-index:10;pointer-events:all;}
.phase.hidden{opacity:0;pointer-events:none;z-index:1;}

/* CANVAS LAYERS */
canvas{position:fixed;inset:0;z-index:1;}

/* COUNTDOWN */
#countdown{font-size:min(45vw,250px);font-weight:900;color:transparent;background:linear-gradient(135deg,var(--primary),var(--primary-light),#fff);
  -webkit-background-clip:text;background-clip:text;text-shadow:0 0 60px rgba(255,20,147,0.8);animation:pulse 0.9s ease-in-out infinite;z-index:20;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.1);}}

/* PHASE 2 GIF & TEXT */
#phase2Content { text-align: center; z-index: 20; display: flex; flex-direction: column; align-items: center; }
#phase2Gif { width: min(80vw, 350px); border-radius: 20px; box-shadow: 0 0 40px rgba(255,20,147,0.5); margin-bottom: 20px; }
#bigMessage{ font-size: min(15vw, 80px); font-weight: 900; color: var(--primary); text-shadow: 0 0 30px var(--primary); margin-bottom: 30px; transition: all 0.5s ease; }

/* HEART ANIMATION */
#bigHeart {
  width: min(40vw, 220px); height: min(40vw, 220px);
  display: none; opacity: 0; transform: scale(0);
  filter: drop-shadow(0 0 30px var(--primary));
  transition: all 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
@keyframes heartBeat {
  0%, 100% { transform: scale(1); filter: drop-shadow(0 0 30px var(--primary)); }
  50% { transform: scale(1.1); filter: drop-shadow(0 0 50px var(--primary-light)); }
}
.heart-active { display: block !important; opacity: 1 !important; transform: scale(1) !important; animation: heartBeat 0.8s infinite; }

/* BUTTONS */
.continue-btn{
  padding:18px 50px;background:linear-gradient(135deg,var(--primary),var(--primary-light));
  border:none;border-radius:50px;color:#fff;font-size:20px;font-weight:700;
  letter-spacing:2px;cursor:pointer;box-shadow:0 0 30px rgba(255,20,147,0.6);
  transition:all 0.3s ease;
}
.continue-btn:hover{transform:scale(1.05);box-shadow:0 0 50px rgba(255,20,147,0.9);}

/* PHASE 3 */
#catGif3 { width: min(70vw, 300px); filter: drop-shadow(0 0 30px rgba(255,105,180,0.5)); animation: float 3s ease-in-out infinite; }
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-20px);}}

/* SCRAPBOOK (PHASE 4) */
#phase4 { justify-content: flex-start; padding-top: 20px; }
#phase4Inner { display: flex; flex-direction: column; align-items: center; width: 100%; }

/* Message box over scrapbook */
#msgBox{
  width: min(85vw, 340px); background:rgba(255,255,255,0.95); border-radius:20px;
  padding:15px 20px; margin-bottom:20px;
  box-shadow:0 8px 32px rgba(255,20,147,0.3);
  position:relative; z-index: 100;
}
#msgBox::after{content:'💕';position:absolute;top:10px;right:15px;font-size:16px;}
#msgText{font-family:'Playfair Display',serif;font-style:italic;font-size:15px;
  color:#333;line-height:1.5;text-align:center;}

#scrapbook-container {
  width: var(--book-w); height: var(--book-h);
  perspective: 1500px; position: relative;
}

.book {
  width: 100%; height: 100%; position: relative;
  transform-style: preserve-3d; transition: transform 0.5s;
}

.page {
  position: absolute; width: 100%; height: 100%;
  top: 0; left: 0; transform-origin: left center;
  transform-style: preserve-3d; transition: transform 0.8s cubic-bezier(0.645, 0.045, 0.355, 1);
  cursor: pointer;
}

.page-side {
  position: absolute; width: 100%; height: 100%;
  backface-visibility: hidden; display: flex; flex-direction: column;
  border-radius: 5px 15px 15px 5px; overflow: hidden;
  box-shadow: inset 0 0 100px rgba(0,0,0,0.1), 5px 5px 20px rgba(0,0,0,0.4);
}

.page-front { z-index: 2; background: #fff; }
.page-back { transform: rotateY(-180deg); background: #fdfdfd; z-index: 1; border-radius: 15px 5px 5px 15px; }

.flipped { transform: rotateY(-160deg); }

.cover-front { 
  background-image: url('https://ymkfyaurdgfvdhkkpqam.supabase.co/storage/v1/object/public/assets/kapak.jpg'); 
  background-size: cover; 
  background-position: center;
  display: flex; align-items: center; justify-content: center; 
  color: white; border-left: 10px solid rgba(0,0,0,0.2); 
}
.cover-back { 
  background-image: url('https://ymkfyaurdgfvdhkkpqam.supabase.co/storage/v1/object/public/assets/kapak.jpg'); 
  background-size: cover; 
  background-position: center;
  border-right: 10px solid rgba(0,0,0,0.2); 
}

.page-img { width: 100%; height: 75%; object-fit: cover; border-bottom: 5px solid #eee; }
.page-content { height: 25%; padding: 15px; display: flex; align-items: center; justify-content: center; text-align: center; color: #333; font-family: 'Playfair Display', serif; font-size: 16px; font-style: italic; }

.instruction { position: absolute; bottom: -50px; width: 100%; text-align: center; font-size: 14px; opacity: 0.7; animation: blink 2s infinite; }
@keyframes blink { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

/* PHASE 5: HEART PHOTO WALL */
#phase5 { background: transparent; overflow: hidden; }
.heart-wall {
  position: relative; width: 100vw; height: 100vh;
  display: flex; align-items: center; justify-content: center;
}
.mini-photo {
  position: absolute;
  border: 4px solid #fff;
  border-radius: 18px;
  background-size: cover;
  background-position: center;
  box-shadow: 0 4px 15px rgba(0,0,0,0.4);
  opacity: 0;
  transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275), opacity 0.4s ease;
}
.mini-photo::before {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0; height: 45%;
  background: linear-gradient(to top, rgba(255,140,190, 0.9), transparent);
  border-radius: 0 0 13px 13px;
  pointer-events: none;
  z-index: 1;
}
.mini-photo::after {
  content: '🫶';
  position: absolute;
  bottom: 6px; left: 0; right: 0;
  text-align: center;
  font-size: 18px;
  color: #fff;
  pointer-events: none;
  filter: drop-shadow(0 2px 3px rgba(0,0,0,0.3));
  z-index: 2;
}
.mini-photo:hover { 
  transform: scale(1.15) rotate(0deg) !important; 
  z-index: 100 !important; 
  box-shadow: 0 0 20px #fff, 0 0 40px rgba(255,20,147,0.8); 
}

#finalMessage {
  position: absolute;
  bottom: 8%;
  font-family: 'Dancing Script', cursive;
  font-size: min(10vw, 42px); 
  color: #fff;
  text-shadow: 0 0 10px #ff1493, 0 0 20px #ff1493, 0 0 30px #ff1493;
  opacity: 0;
  z-index: 60;
  text-align: center;
  width: 100%;
}
#replayBtn { 
  position: absolute;
  bottom: 5%;
  background: rgba(255,255,255,0.1); 
  border: 1px solid rgba(255,255,255,0.2); 
  color: #fff; 
  padding: 8px 16px; 
  border-radius: 20px; 
  cursor: pointer; 
  z-index: 60;
}


/* ===== ROTATE SCREEN OVERLAY ===== */
#rotateOverlay {
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 28px;
  transition: opacity 0.7s ease;
}
#rotateOverlay.hidden {
  opacity: 0;
  pointer-events: none;
}

/* The combined phone+arrow icon wrapper */
.ro-icon-wrap {
  position: relative;
  width: 100px;
  height: 100px;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* Phone rect that tilts */
.ro-phone {
  animation: roTilt 2s ease-in-out infinite;
  transform-origin: center center;
}
@keyframes roTilt {
  0%   { transform: rotate(0deg); }
  20%  { transform: rotate(0deg); }
  55%  { transform: rotate(-90deg); }
  80%  { transform: rotate(-90deg); }
  100% { transform: rotate(0deg); }
}

/* Circular arrow that spins once per cycle */
.ro-arc {
  position: absolute;
  inset: 0;
  animation: roArcSpin 2s ease-in-out infinite;
  transform-origin: center center;
}
@keyframes roArcSpin {
  0%   { opacity: 0.3; transform: rotate(0deg); }
  20%  { opacity: 1;   transform: rotate(0deg); }
  55%  { opacity: 1;   transform: rotate(-90deg); }
  80%  { opacity: 0.6; transform: rotate(-90deg); }
  100% { opacity: 0.3; transform: rotate(0deg); }
}

/* Text */
.ro-label {
  font-family: 'Rajdhani', sans-serif;
  font-size: 18px;
  font-weight: 600;
  color: rgba(255,255,255,0.85);
  letter-spacing: 1.5px;
  text-align: center;
  animation: roBlink 2s ease-in-out infinite;
}
@keyframes roBlink {
  0%, 100% { opacity: 0.5; }
  50%       { opacity: 1; }
}

/* Hide content while portrait - only applies on mobile */
@media (max-width: 1024px) {
  body.portrait-mode > canvas,
  body.portrait-mode > .phase {
    visibility: hidden;
    pointer-events: none;
  }
}
</style>
</head>
<body>

<!-- ROTATE OVERLAY -->
<div id="rotateOverlay" class="hidden">
  <div class="ro-icon-wrap">
    <!-- SVG: phone body + circular rotation arrows -->
    <svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path class="ro-arc" d="M70 30 A30 30 0 0 0 30 30" stroke="#ff69b4" stroke-width="4" stroke-linecap="round"/>

  <button style="background: transparent; border: 1px solid #ff69b4; color: #ff69b4; padding: 8px 20px; border-radius: 20px; font-size: 14px; cursor: pointer; text-transform: uppercase; margin-top: 20px;" onclick="forceStart()">Atla (Önerilmez)</button>
</div>

<canvas id="matrixCanvas"></canvas>
<canvas id="starsCanvas" style="display:none;"></canvas>

<!-- PHASE 1 -->
<div class="phase" id="phase1">
  <div id="countdown">3</div>
</div>

<!-- PHASE 2 -->
<div class="phase hidden" id="phase2">
  <div id="phase2Content">
    <div id="bigMessage"></div>
    <div id="bigHeart">
      <svg viewBox="0 0 100 100" fill="var(--primary)">
        <path d="M50 88.9L42.8 82.4C17.1 59.1 0 43.6 0 24.6C0 9.1 12.1 0 27.5 0C36.2 0 44.5 4.1 50 10.5C55.5 4.1 63.8 0 72.5 0C87.9 0 100 9.1 100 24.6C100 43.6 82.9 59.1 57.2 82.5L50 88.9Z" />
      </svg>
    </div>
    <!-- VIDEO OR GIF SUPPORT -->
    <img id="phase2Gif" src="" alt="CUTE GIF" style="display:none;">
    <video id="phase2Video" style="display:none; width: min(80vw, 350px); border-radius: 20px; box-shadow: 0 0 40px rgba(255,20,147,0.5); margin-bottom: 20px;" autoplay muted loop playsinline></video>
    
    <button class="continue-btn" style="display:none; margin-top:20px;" onclick="goPhase4()">Devam Et ✨</button>
  </div>
</div>

<!-- PHASE 3 REMOVED - DIRECT TO 4 -->

<!-- PHASE 4 -->
<div class="phase hidden" id="phase4">
  <div id="phase4Inner">
    <div id="msgBox"><p id="msgText"></p></div>
    <div id="scrapbook-container">
      <div class="book" id="book">
        <!-- Pages will be generated here -->
      </div>
      <div class="instruction">Sayfaları çevirmek için tıkla veya kaydır 📖</div>
    </div>
  </div>
</div>

<!-- PHASE 5 -->
<div class="phase hidden" id="phase5">
  <div class="heart-wall" id="heartWall"></div>
  <h2 id="finalMessage">Seni Çok Seviyorum! ✨</h2>
  <button id="replayBtn" onclick="location.reload()">↺ Baştan İzle</button>
</div>

<!-- CRITICAL: forceStart standalone - must work even if main script fails -->
<script>
window.forceStart = function() {
  var o = document.getElementById('rotateOverlay');
  if (o) { o.style.display = 'none'; o.classList.add('hidden'); }
  document.body.classList.remove('portrait-mode');
  window._skipPressed = true;
  if (typeof window._doStart === 'function') window._doStart();
};
</script>

<!-- LIBS (async = don't block main script) -->
<script async src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<script async src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// forceStart MUST be defined first — before anything that might throw
window.forceStart = function() {
  try {
    var overlay = document.getElementById('rotateOverlay');
    if (overlay) { overlay.classList.add('hidden'); overlay.style.display = 'none'; }
    document.body.classList.remove('portrait-mode');
    if (window.CONFIG) window.CONFIG._go = true;
    if (window._startExperience) window._startExperience();
    else window._pendingStart = true;
  } catch(e) { console.error('forceStart error:', e); }
};
// SUPABASE CONNECTION
const SUPABASE_URL = "https://ymkfyaurdgfvdhkkpqam.supabase.co";
const SUPABASE_KEY = "sb_publishable_y2Txq9nCopsoNAR8aSKL3g_hjuCT8n_";
let supabase = null;
try {
  supabase = (window.supabase && window.supabase.createClient)
    ? window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)
    : null;
} catch(e) {
  console.warn('Supabase başlatılamadı, offline modda çalışılıyor:', e.message);
}

let CONFIG = window.CONFIG = {
  matrixMessage: "YÜKLENİYOR...", 
  phase2File: "https://ymkfyaurdgfvdhkkpqam.supabase.co/storage/v1/object/public/assets/lovebombing.mp4", 
  pages: []
};

async function loadGiftData() {
  const urlParams = new URLSearchParams(window.location.search);
  const giftId = urlParams.get('id');

  if (giftId && supabase) {
    try {
      const { data, error } = await supabase
        .from('submissions')
        .select('*')
        .eq('id_custom', giftId)
        .single();

      if (error) throw error;

      if (data) {
        CONFIG.matrixMessage = data.matrix_message || "MUTLU YILLAR";
        CONFIG.phase2File = data.gif_url || CONFIG.phase2File;
        
        // Transform memories to pages format
        if (data.memories && Array.isArray(data.memories)) {
          CONFIG.pages = data.memories.map((m, idx) => ({
            photoFront: m.photo,
            photoBack: m.photo, // For now use same photo for back or a default
            message: m.note || `Anı #${idx + 1}`
          }));
        }
      }
    } catch (err) {
      console.error("Veri yükleme hatası:", err);
      CONFIG.matrixMessage = "HATA OLUŞTU";
    }
  }

  // Fallback if no pages were loaded
  if (!CONFIG.pages || CONFIG.pages.length === 0) {
    CONFIG.pages = [
      { photoFront: 'https://ymkfyaurdgfvdhkkpqam.supabase.co/storage/v1/object/public/assets/foto1.jpg', photoBack: 'https://ymkfyaurdgfvdhkkpqam.supabase.co/storage/v1/object/public/assets/foto1.jpg', message: 'İlk anımız...' },
      { photoFront: 'https://ymkfyaurdgfvdhkkpqam.supabase.co/storage/v1/object/public/assets/foto2.jpg', photoBack: 'https://ymkfyaurdgfvdhkkpqam.supabase.co/storage/v1/object/public/assets/foto2.jpg', message: 'Gülüşün...' },
      { photoFront: 'https://ymkfyaurdgfvdhkkpqam.supabase.co/storage/v1/object/public/assets/foto3.jpg', photoBack: 'https://ymkfyaurdgfvdhkkpqam.supabase.co/storage/v1/object/public/assets/foto3.jpg', message: 'Beraberken her şey güzel' },
      { photoFront: 'https://ymkfyaurdgfvdhkkpqam.supabase.co/storage/v1/object/public/assets/foto4.jpg', photoBack: 'https://ymkfyaurdgfvdhkkpqam.supabase.co/storage/v1/object/public/assets/foto4.jpg', message: 'Seni çok seviyorum!' }
    ];
  }
  
  CONFIG._loaded = true;
  if (!CONFIG._started) {
    tryStartExperience();
  }
}

function isTouchDevice() {
  return ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
}

function forceStart() {
  const overlay = document.getElementById('rotateOverlay');
  overlay.classList.add('hidden');
  CONFIG._go = true;
  tryStartExperience();
}

function checkOrientation() {
  const overlay = document.getElementById('rotateOverlay');
  
  if (!isTouchDevice()) {
    overlay.classList.add('hidden');
    document.body.classList.remove('portrait-mode');
    CONFIG._go = true;
    tryStartExperience();
    return;
  }

  const isLandscape = window.innerWidth > window.innerHeight;
  if (isLandscape || CONFIG._go) {
    overlay.classList.add('hidden');
    document.body.classList.remove('portrait-mode');
    tryStartExperience();
  } else {
    if (!CONFIG._started) {
      overlay.classList.remove('hidden');
      document.body.classList.add('portrait-mode');
    }
  }
}

function tryStartExperience() {
  const isLandscape = window.innerWidth > window.innerHeight;
  if (CONFIG._loaded && (isLandscape || CONFIG._go || !isTouchDevice()) && !CONFIG._started) {
    CONFIG._started = true;
    startExperience();
  }
}

window._startExperience = function startExperience() {
  matrixChars = (window.CONFIG && window.CONFIG.matrixMessage)
    ? window.CONFIG.matrixMessage.split('') : "GULUMSEDİYE".split('');
  startMatrix();
  startCountdown();
};
function startExperience() { window._startExperience(); }
window._doStart = startExperience;

// Initial state
let matrixChars = "GÜLÜMSEDİYE".split('');


// --- MATRIX ---
const mc = document.getElementById('matrixCanvas');
const mctx = mc.getContext('2d');
let matrixInt;

function initMatrix(){
  mc.width = window.innerWidth; mc.height = window.innerHeight;
  const fontSize = 16;
  matrixCols = Math.floor(mc.width / fontSize);
  matrixDrops = Array(matrixCols).fill(1);
}
function drawMatrix(){
  mctx.fillStyle = 'rgba(10,10,26,0.1)';
  mctx.fillRect(0,0,mc.width,mc.height);
  const fontSize = 16;
  mctx.font = `900 ${fontSize}px Rajdhani`;
  for(let i=0; i<matrixDrops.length; i++){
    const ch = matrixChars[Math.floor(Math.random()*matrixChars.length)];
    mctx.fillStyle = Math.random() > 0.8 ? '#fff' : '#ff1493';
    mctx.fillText(ch, i*fontSize, matrixDrops[i]*fontSize);
    if(matrixDrops[i]*fontSize > mc.height && Math.random() > 0.975) matrixDrops[i] = 0;
    matrixDrops[i]++;
  }
}
function startMatrix() {
  initMatrix();
  matrixInt = setInterval(drawMatrix, 50);
}

// --- STARS ---
const sc = document.getElementById('starsCanvas');
const sctx = sc.getContext('2d');
let stars = [];
function initStars(){
  sc.width = window.innerWidth; sc.height = window.innerHeight;
  stars = Array.from({length:200}, ()=>({x:Math.random()*sc.width, y:Math.random()*sc.height, r:Math.random()*1.5, a:Math.random(), s:Math.random()*0.02}));
}
function drawStars(){
  sctx.clearRect(0,0,sc.width,sc.height);
  stars.forEach(s=>{
    s.a += s.s; if(s.a>1||s.a<0) s.s*=-1;
    sctx.beginPath(); sctx.arc(s.x,s.y,s.r,0,Math.PI*2);
    sctx.fillStyle=`rgba(255,255,255,${Math.abs(s.a)})`; sctx.fill();
  });
  requestAnimationFrame(drawStars);
}

// --- FLOW ---
let count = 3;
const cd = document.getElementById('countdown');
let cdInt;
function startCountdown() {
  cdInt = setInterval(()=>{
    count--;
    if(count > 0) { cd.textContent = count; }
    else { clearInterval(cdInt); goPhase2(); }
  }, 1000);
}

function goPhase2(){
  document.getElementById('phase1').classList.add('hidden');
  document.getElementById('phase2').classList.remove('hidden');
  
  const gif = document.getElementById('phase2Gif');
  const msg = document.getElementById('bigMessage');
  const heart = document.getElementById('bigHeart');
  const btn = document.querySelector('#phase2 .continue-btn');
  
  const words = CONFIG.matrixMessage.split(' ');
  let wordIdx = 0;

  function showNextWord() {
    if (wordIdx < words.length) {
      msg.textContent = words[wordIdx];
      msg.style.opacity = '1';
      msg.style.transform = 'scale(1)';
      
      setTimeout(() => {
        msg.style.opacity = '0';
        msg.style.transform = 'scale(1.5)';
        wordIdx++;
        setTimeout(showNextWord, 600);
      }, 1200);
    } else {
      showHeart();
    }
  }

  function showHeart() {
    heart.classList.add('heart-active');
    setTimeout(() => {
      heart.classList.remove('heart-active');
      heart.style.display = 'none';
      showGif();
    }, 2500);
  }

  function showGif() {
    const video = document.getElementById('phase2Video');
    const gif = document.getElementById('phase2Gif');
    
    if (CONFIG.phase2File.endsWith('.mp4')) {
      video.src = CONFIG.phase2File;
      video.style.display = 'block';
      video.style.opacity = '1';
    } else {
      gif.src = CONFIG.phase2File;
      gif.style.display = 'block';
      gif.style.opacity = '1';
    }
    
    setTimeout(() => { btn.style.display = 'block'; }, 2000);
  }

  showNextWord();
}

function goPhase4(){
  document.getElementById('phase2').classList.add('hidden');
  clearInterval(matrixInt);
  mc.style.display = 'none';
  sc.style.display = 'block';
  initStars(); drawStars();
  document.getElementById('phase4').classList.remove('hidden');
  buildBook();
  launchConfetti();
}

function goPhase5(){
  document.getElementById('phase4').classList.add('hidden');
  document.getElementById('phase5').classList.remove('hidden');
  buildHeartWall();
}

function spawnFloatingEmojis() {
  const emojis = ['❤️', '✨', '💖'];
  setInterval(() => {
    const el = document.createElement('div');
    el.innerText = emojis[Math.floor(Math.random() * emojis.length)];
    el.style.position = 'absolute';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.top = '110vh';
    el.style.fontSize = (Math.random() * 15 + 15) + 'px';
    el.style.opacity = '0.7';
    el.style.zIndex = Math.random() > 0.5 ? '25' : '5';
    el.style.pointerEvents = 'none';
    el.style.filter = 'drop-shadow(0 0 5px rgba(255,255,255,0.5))';
    el.style.transition = 'transform 8s linear, top 8s linear, opacity 8s ease-in-out';
    document.getElementById('phase5').appendChild(el);

    setTimeout(() => {
      el.style.top = '-10vh';
      el.style.transform = `translateX(${(Math.random() - 0.5) * 200}px) rotate(${Math.random() * 360}deg)`;
      el.style.opacity = '0';
    }, 50);

    setTimeout(() => el.remove(), 8000);
  }, 300);
}

function buildHeartWall(){
  const wall = document.getElementById('heartWall');
  wall.innerHTML = '';

  const photos = CONFIG.pages && CONFIG.pages.length > 0
    ? CONFIG.pages.map(p => p.photoFront)
    : ['https://ymkfyaurdgfvdhkkpqam.supabase.co/storage/v1/object/public/assets/foto1.jpg'];

  const W = window.innerWidth;
  const H = window.innerHeight;

  // Maximize size while fitting in screen perfectly
  let pw = W * 0.23;
  if (pw > 160) pw = 160; 
  if (pw < 80) pw = 80;
  const ph = pw * 1.15;
  const s = pw / 1.3; 

  // Big blurry pink glow background aura
  const glowBg = document.createElement('div');
  glowBg.style.cssText = `
    position: absolute;
    width: ${pw * 4.5}px; height: ${ph * 4.5}px;
    background: radial-gradient(circle, rgba(255,105,180,0.6) 0%, rgba(255,20,147,0.3) 40%, transparent 70%);
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    filter: blur(40px);
    z-index: 1;
    pointer-events: none;
  `;
  wall.appendChild(glowBg);

  // Exact coordinates matching the TikTok filter heart ring layout
  const ringPoints = [
    { x: 0,    y: 0.2,  rot: -3,  z: 9 },  // 0: Center photo
    { x: 0,    y: -0.7, rot: 5,   z: 10 }, // 1: Cleft
    { x: -0.8, y: -1.2, rot: -15, z: 20 }, // 2: Inner Top L
    { x: 0.8,  y: -1.2, rot: 15,  z: 20 }, // 3: Inner Top R
    { x: -1.6, y: -0.9, rot: -25, z: 19 }, // 4: Outer Top L
    { x: 1.6,  y: -0.9, rot: 25,  z: 19 }, // 5: Outer Top R
    { x: -1.9, y: 0.0,  rot: -10, z: 18 }, // 6: Mid L
    { x: 1.9,  y: 0.0,  rot: 10,  z: 18 }, // 7: Mid R
    { x: -1.5, y: 0.8,  rot: 5,   z: 17 }, // 8: Lower Mid L
    { x: 1.5,  y: 0.8,  rot: -5,  z: 17 }, // 9: Lower Mid R
    { x: -0.8, y: 1.4,  rot: 15,  z: 16 }, // 10: Bot L
    { x: 0.8,  y: 1.4,  rot: -15, z: 16 }, // 11: Bot R
    { x: 0,    y: 2.0,  rot: 0,   z: 15 }  // 12: Bottom Tip
  ];

  ringPoints.forEach((p, i) => {
    setTimeout(() => {
      const div = document.createElement('div');
      div.className = 'mini-photo';
      div.style.width  = pw + 'px';
      div.style.height = ph + 'px';
      div.style.zIndex = p.z;
      div.style.backgroundImage = `url('${photos[i % photos.length]}')`;

      const ox = (Math.random() - 0.5) * 8;
      const oy = (Math.random() - 0.5) * 8;

      // Center vertically slightly higher to account for heart bottom tip
      const centerY = H/2 - (ph * 0.2); 
      div.style.left = (W/2 + p.x * s - pw/2 + ox) + 'px';
      div.style.top  = (centerY + p.y * s - ph/2 + oy) + 'px';
      div.style.transform = `rotate(${p.rot}deg) scale(0)`;
      wall.appendChild(div);

      requestAnimationFrame(() => requestAnimationFrame(() => {
        div.style.opacity   = '1';
        div.style.transform = `rotate(${p.rot}deg) scale(1)`;
      }));

      if(i === ringPoints.length - 1) {
        setTimeout(() => {
          const finalMsg = document.getElementById('finalMessage');
          finalMsg.style.opacity    = '1';
          finalMsg.style.transition = 'opacity 2s, transform 2s';
          finalMsg.style.transform  = 'translateY(-10px)';
          launchConfetti();
          spawnFloatingEmojis();
        }, 1200);
      }
    }, i * 180);
  });
}


// --- BOOK ---
function buildBook(){
  const book = document.getElementById('book');
  book.innerHTML = '';
  const msgText = document.getElementById('msgText');
  
  // 1. FRONT COVER
  const frontCover = document.createElement('div');
  frontCover.className = 'page';
  frontCover.style.zIndex = CONFIG.pages.length + 2;
  frontCover.innerHTML = `
    <div class="page-side page-front cover-front">
    </div>
    <div class="page-side page-back" style="background:#f9f9f9;">
      <div style="padding: 40px; text-align: center; height: 100%; display: flex; align-items: center;">
        <p style="font-family:'Playfair Display'; font-style: italic; font-size: 18px; color: #555;">Her sayfa seninle daha güzel... ❤️</p>
      </div>
    </div>
  `;
  frontCover.onclick = () => {
    const isFlipped = frontCover.classList.toggle('flipped');
    frontCover.style.zIndex = isFlipped ? 1 : CONFIG.pages.length + 2;
    msgText.textContent = isFlipped ? CONFIG.pages[0].message : "Bizim Hikayemiz 💝";
  };
  book.appendChild(frontCover);

  // Set initial message
  msgText.textContent = "Bizim Hikayemiz 💝";

  // 2. CONTENT PAGES
  CONFIG.pages.forEach((p, i) => {
    const page = document.createElement('div');
    page.className = 'page';
    page.style.zIndex = CONFIG.pages.length - i;
    
    page.innerHTML = `
      <div class="page-side page-front">
        <img src="${p.photoFront}" class="page-img">
        <div class="page-content" style="background:#fff; height:100%; border-top: 1px solid #eee;">
          <p style="font-size: 13px; color: #888;">Anı ${i + 1}</p>
        </div>
      </div>
      <div class="page-side page-back">
        <img src="${p.photoBack}" class="page-img">
        <div class="page-content" style="background:#fff; height:100%; border-top: 1px solid #eee;">
          <p style="font-size: 13px; color: #888;">💕</p>
        </div>
      </div>
    `;
    
    page.onclick = () => {
      const isFlipped = page.classList.toggle('flipped');
      if(isFlipped){
        page.style.zIndex = i + 2;
        if(CONFIG.pages[i+1]) msgText.textContent = CONFIG.pages[i+1].message;
        else msgText.textContent = "Son sayfa... ❤️";
      } else {
        setTimeout(() => { page.style.zIndex = CONFIG.pages.length - i; }, 300);
        msgText.textContent = p.message || "Anılarımız 💝";
      }
    };
    
    book.appendChild(page);
  });

  // 3. BACK COVER
  const backCover = document.createElement('div');
  backCover.className = 'page';
  backCover.style.zIndex = 0;
  backCover.innerHTML = `
    <div class="page-side page-front" style="background:#f9f9f9; display: flex; align-items: center; justify-content: center;">
       <p style="font-family:'Dancing Script'; font-size: 24px; color: #ff1493;">Seni Seviyorum!</p>
    </div>
    <div class="page-side page-back cover-back"></div>
  `;
  
  backCover.onclick = () => {
    const isFlipped = backCover.classList.toggle('flipped');
    if (isFlipped) {
      backCover.style.zIndex = CONFIG.pages.length + 3;
      msgText.textContent = "Kitap kapandı... 💖";
      // Auto transition to phase 5
      setTimeout(() => {
        goPhase5();
      }, 1500);
    } else {
      setTimeout(() => { backCover.style.zIndex = 0; }, 300);
      msgText.textContent = "Seni Seviyorum!";
    }
  };
  
  book.appendChild(backCover);
}

// --- HELPERS ---
function launchConfetti(){
  for(let i=0; i<100; i++){
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random()*100 + 'vw';
    c.style.background = ['#ff1493','#ff69b4','#fff','#ffd700'][Math.floor(Math.random()*4)];
    c.style.transform = `rotate(${Math.random()*360}deg)`;
    document.body.appendChild(c);
    const fall = c.animate([
      { top: '-10px', opacity: 1 },
      { top: '100vh', opacity: 0, transform: `rotate(${Math.random()*1000}deg)` }
    ], { duration: 2000 + Math.random()*3000, easing: 'linear' });
    fall.onfinish = () => c.remove();
  }
}

loadGiftData(); 
checkOrientation(); // Also check initially

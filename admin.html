        /* TABLE */

</head>
<body>

<!-- LOGIN OVERLAY -->
<div id="loginOverlay">

</div>

<!-- DASHBOARD -->
<header>
    <div class="logo">ğŸ“Š Admin Dashboard</div>
    <div style="display:flex; gap:15px; align-items:center;">
        <button id="refreshBtn" onclick="loadSubmissions()">â†» Yenile</button>
        <div class="stat-card">
            <div class="stat-value" id="totalCount">â€”</div>

        </div>
        <div class="stat-card">
            <div class="stat-value" id="activeCount">â€”</div>

<div class="table-container">
    <table>
        <thead>
            <tr>
                <th>Tarih</th>
                <th>ID</th>
                <th>Durum</th>

                <th>AnÄ±</th>
                <th>MÃ¼ÅŸteri Linki</th>

            </tr>
        </thead>

    </table>

</div>

<script>
    const ADMIN_PASS = "admin123";
    const BASE_URL = window.location.origin;

    document.getElementById('adminPass').addEventListener('keydown', e => {
        if (e.key === 'Enter') checkPass();
    });

    function checkPass() {
        const val = document.getElementById('adminPass').value;
        if (val === ADMIN_PASS) {
            document.getElementById('loginOverlay').style.display = 'none';
            initSupabaseAndLoad();
        } else {
            document.getElementById('loginError').style.display = 'block';
            document.getElementById('adminPass').value = '';
            document.getElementById('adminPass').focus();
        }
    }

    const SUPABASE_URL = "https://ymkfyaurdgfvdhkkpqam.supabase.co";
    const SUPABASE_KEY = "sb_publishable_y2Txq9nCopsoNAR8aSKL3g_hjuCT8n_";
    let sb = null;

    function initSupabaseAndLoad() {
        const script = document.createElement('script');
        script.src = 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2';
        script.onload = () => {
            sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            loadSubmissions();
        };
        script.onerror = () => {
            document.getElementById('statusMsg').innerHTML = '<span class="empty-icon">âŒ</span>Supabase yÃ¼klenemedi.';
        };
        document.head.appendChild(script);
    }

    async function loadSubmissions() {
        document.getElementById('statusMsg').style.display = 'block';
        document.getElementById('statusMsg').innerHTML = '<span class="empty-icon">â³</span>Veriler yÃ¼kleniyor...';
        document.getElementById('tableBody').innerHTML = '';
        if (!sb) return;
        try {
            const { data, error } = await sb
                .from('submissions')
                .select('*')
                .order('created_at', { ascending: false });
            if (error) throw error;
            renderTable(data || []);
        } catch (err) {
            document.getElementById('statusMsg').innerHTML = `<span class="empty-icon">âŒ</span>Hata: ${err.message}`;
        }
    }

    function renderTable(data) {
        const tbody = document.getElementById('tableBody');
        document.getElementById('totalCount').textContent = data.length;

        const activeOrders = data.filter(d => d.customer_info && !d.customer_info.includes('Demo'));
        document.getElementById('activeCount').textContent = activeOrders.length;

        if (data.length === 0) {
            document.getElementById('statusMsg').innerHTML = '<span class="empty-icon">ğŸ“­</span>HenÃ¼z hiÃ§ baÅŸvuru yok.';
            return;
        }

        document.getElementById('statusMsg').style.display = 'none';
        tbody.innerHTML = '';

        data.forEach(item => {
            const tr = document.createElement('tr');
            const date = item.created_at
                ? new Date(item.created_at).toLocaleString('tr-TR')
                : 'â€”';
            const memCount = Array.isArray(item.memories) ? item.memories.length : 0;
            const giftUrl = `${BASE_URL}/lovebombing.html?id=${item.id_custom}`;

            const isDemo = item.customer_info && item.customer_info.includes('Demo');
            const statusBadge = isDemo
                ? `<span class="badge-demo">â³ Demo</span>`
                : `<span class="badge-active">âœ… Aktif</span>`;

            tr.innerHTML = `
                <td class="date">${date}</td>
                <td><span class="badge-id">#${item.id_custom || 'â€”'}</span></td>
                <td>${statusBadge}</td>
                <td class="msg-cell" title="${item.matrix_message || ''}">${item.matrix_message || 'â€”'}</td>
                <td>${memCount} ğŸ“¸</td>
                <td>
                    <div class="link-box">
                        <span class="link-text" title="${giftUrl}">${giftUrl}</span>
                        <button class="copy-btn" onclick="copyLink(this, '${giftUrl}')">ğŸ“‹ Kopyala</button>
                    </div>
                </td>
                <td>
                    <a href="${giftUrl}" target="_blank" class="btn-view">GÃ¶rÃ¼ntÃ¼le â†—</a>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    function copyLink(btn, url) {
        navigator.clipboard.writeText(url).then(() => {
            btn.textContent = 'âœ… KopyalandÄ±';
            btn.classList.add('copied');
            setTimeout(() => {
                btn.textContent = 'ğŸ“‹ Kopyala';
                btn.classList.remove('copied');
            }, 2000);
        }).catch(() => {
            // Fallback for non-https
            const ta = document.createElement('textarea');
            ta.value = url;
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
            btn.textContent = 'âœ… KopyalandÄ±';
            btn.classList.add('copied');
            setTimeout(() => {
                btn.textContent = 'ğŸ“‹ Kopyala';
                btn.classList.remove('copied');
            }, 2000);
        });
    }
</script>
